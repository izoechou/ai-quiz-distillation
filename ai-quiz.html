<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZLTI 蒸馏型人格指标</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-primary: #050508;
    --bg-secondary: #0a0a10;
    --bg-card: rgba(255,255,255,0.025);
    --border-color: rgba(255,255,255,0.06);
    --border-glow: rgba(0,255,200,0.12);
    --text-primary: #e8e8ec;
    --text-secondary: #a0a0b0;
    --text-muted: #555568;
    --accent-cyan: #00ffc8;
    --accent-red: #ff2d55;
    --accent-orange: #ff9500;
    --accent-purple: #bf5af2;
    --glow-cyan: rgba(0,255,200,0.15);
    --glow-red: rgba(255,45,85,0.15);
    --font-display: 'Orbitron', 'Noto Sans SC', sans-serif;
    --font-body: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  body {
    font-family: var(--font-body);
    background: var(--bg-primary);
    color: var(--text-secondary);
    line-height: 1.7;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(0,255,200,0.03) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(255,45,85,0.03) 0%, transparent 50%);
  }

  .app { max-width: 480px; margin: 0 auto; padding: 20px 16px 60px; position: relative; }
  .hidden { display: none !important; }

  /* ===== 扫描线动画 ===== */
  @keyframes scanline { 0% { top: -2px; } 100% { top: 100%; } }
  @keyframes flicker { 0%,100% { opacity: 1; } 50% { opacity: 0.97; } }
  @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 20px var(--glow-cyan), inset 0 0 20px rgba(0,255,200,0.02); } 50% { box-shadow: 0 0 40px var(--glow-cyan), inset 0 0 40px rgba(0,255,200,0.04); } }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes typeIn { from { opacity: 0; filter: blur(4px); } to { opacity: 1; filter: blur(0); } }
  @keyframes borderGlow { 0%,100% { border-color: rgba(0,255,200,0.08); } 50% { border-color: rgba(0,255,200,0.2); } }

  .animate-in { animation: fadeInUp 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
  .delay-1 { animation-delay: 0.12s; opacity: 0; }
  .delay-2 { animation-delay: 0.24s; opacity: 0; }
  .delay-3 { animation-delay: 0.36s; opacity: 0; }
  .delay-4 { animation-delay: 0.48s; opacity: 0; }
  .delay-5 { animation-delay: 0.60s; opacity: 0; }

  /* ===== 首页 ===== */
  .home {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: calc(100vh - 80px); text-align: center; padding-top: 40px;
    position: relative;
  }
  .home::before {
    content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 1px; height: 120px;
    background: linear-gradient(to bottom, transparent, var(--accent-cyan), transparent);
    opacity: 0.3;
  }

  .brand-tag {
    font-family: var(--font-display); font-size: 11px; letter-spacing: 6px;
    color: var(--accent-cyan); text-transform: uppercase; margin-bottom: 16px;
    padding: 6px 20px; border: 1px solid rgba(0,255,200,0.15); border-radius: 2px;
    background: rgba(0,255,200,0.03);
  }

  .home-title {
    font-family: var(--font-display); font-size: 56px; font-weight: 900;
    color: var(--text-primary); letter-spacing: 8px; margin-bottom: 4px;
    text-shadow: 0 0 40px var(--glow-cyan);
    line-height: 1.1;
  }

  .home-subtitle-cn {
    font-size: 16px; font-weight: 300; color: var(--text-muted);
    letter-spacing: 4px; margin-bottom: 8px;
  }

  .home-subtitle-en {
    font-family: var(--font-display); font-size: 11px; color: var(--text-muted);
    letter-spacing: 3px; margin-bottom: 32px; opacity: 0.5;
  }

  .home-desc {
    font-size: 28px; color: var(--accent-red); margin-bottom: 48px;
    font-weight: 900; letter-spacing: 3px;
    text-shadow: 0 0 20px rgba(255, 40, 80, 0.5), 0 0 40px rgba(255, 40, 80, 0.2);
  }

  .btn-start {
    width: 240px; height: 56px; border: 1px solid var(--accent-cyan); border-radius: 2px;
    background: transparent; color: var(--accent-cyan);
    font-family: var(--font-display); font-size: 14px; font-weight: 700;
    cursor: pointer; letter-spacing: 4px; text-transform: uppercase;
    transition: all 0.3s ease; position: relative; overflow: hidden;
  }
  .btn-start::before {
    content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0,255,200,0.1), transparent);
    transition: left 0.5s ease;
  }
  .btn-start:hover::before { left: 100%; }
  .btn-start:hover { background: rgba(0,255,200,0.05); box-shadow: 0 0 30px var(--glow-cyan); }
  .btn-start:active { transform: scale(0.97); }

  .footer-text {
    position: fixed; bottom: 20px; left: 0; right: 0; text-align: center;
    font-size: 11px; color: #222; letter-spacing: 1px;
  }

  /* ===== 答题页 ===== */
  .quiz-page { padding-top: 24px; }

  .progress-bar-bg { width: 100%; height: 2px; background: rgba(255,255,255,0.04); margin-bottom: 8px; }
  .progress-bar-fill { height: 100%; background: var(--accent-cyan); transition: width 0.4s cubic-bezier(0.16,1,0.3,1); box-shadow: 0 0 12px var(--glow-cyan); }
  .progress-label { font-family: var(--font-display); font-size: 11px; color: var(--text-muted); margin-bottom: 36px; text-align: right; letter-spacing: 2px; }

  .question-text {
    font-size: 22px; color: var(--text-primary); font-weight: 700;
    line-height: 1.6; margin-bottom: 32px; letter-spacing: 0.5px;
  }

  .option-list { display: flex; flex-direction: column; gap: 12px; }

  .option {
    background: var(--bg-card);
    border: 1px solid var(--border-color); border-radius: 4px;
    padding: 18px 20px; cursor: pointer;
    transition: all 0.25s ease; display: flex; align-items: flex-start; gap: 16px;
    position: relative; overflow: hidden;
  }
  .option::before {
    content: ''; position: absolute; left: 0; top: 0; width: 2px; height: 100%;
    background: var(--accent-cyan); opacity: 0; transition: opacity 0.25s ease;
  }
  .option:hover { border-color: rgba(0,255,200,0.15); background: rgba(0,255,200,0.02); }
  .option:hover::before { opacity: 1; }
  .option.selected { border-color: var(--accent-cyan); background: rgba(0,255,200,0.04); }
  .option.selected::before { opacity: 1; }
  .option:active { transform: scale(0.98); }

  .option-letter {
    width: 32px; height: 32px; border-radius: 2px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 12px; font-weight: 700;
    color: var(--text-muted); background: rgba(255,255,255,0.04);
    border: 1px solid var(--border-color); transition: all 0.25s ease;
  }
  .option.selected .option-letter { background: var(--accent-cyan); color: #000; border-color: var(--accent-cyan); }

  .option-text-wrap { flex: 1; }
  .option-text { font-size: 15px; color: var(--text-secondary); line-height: 1.6; }

  /* ===== 结果页 ===== */
  .result-page { padding-top: 0; }

  .result-header {
    text-align: center; margin-bottom: 40px; padding: 40px 20px 32px;
    position: relative;
    background: linear-gradient(180deg, rgba(0,255,200,0.02) 0%, transparent 100%);
  }
  .result-header::before {
    content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 60px; height: 1px; background: var(--accent-cyan); opacity: 0.4;
  }

  .result-label {
    font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 20px;
    letter-spacing: 4px; text-transform: uppercase;
    font-family: var(--font-display);
  }
  .result-emoji { font-size: 64px; display: block; margin-bottom: 16px; line-height: 1; filter: saturate(1.2); }
  .result-name {
    font-size: 48px; font-weight: 900; color: var(--text-primary); display: block;
    letter-spacing: 6px; line-height: 1.2; margin-bottom: 8px;
    text-shadow: 0 0 60px var(--glow-cyan);
  }
  .result-en {
    font-family: var(--font-display); font-size: 16px; color: var(--text-muted);
    letter-spacing: 10px; display: block; margin-bottom: 20px; font-weight: 700;
  }
  .tagline-box {
    border: 1px solid rgba(255,45,85,0.15); border-radius: 2px;
    padding: 10px 24px; display: inline-block;
    background: rgba(255,45,85,0.03);
  }
  .tagline { font-size: 15px; color: var(--accent-red); font-style: italic; line-height: 1.5; letter-spacing: 1px; }

  /* 区块标题 */
  .section-title {
    font-family: var(--font-display); font-size: 12px; font-weight: 700;
    color: var(--accent-cyan); display: block; margin-bottom: 16px;
    letter-spacing: 4px; text-transform: uppercase;
    position: relative; padding-left: 16px;
  }
  .section-title::before {
    content: '▍'; position: absolute; left: 0; top: 0;
    color: var(--accent-cyan); font-size: 12px;
  }

  /* 人格解读 */
  .desc-section { margin-bottom: 40px; }
  .desc-content {
    background: var(--bg-card); border-radius: 4px; padding: 28px;
    border: 1px solid var(--border-color); position: relative;
    animation: borderGlow 4s ease-in-out infinite;
  }
  .desc-text { font-size: 15px; color: var(--text-secondary); line-height: 2; display: block; margin-bottom: 16px; }
  .desc-text:last-child { margin-bottom: 0; }

  /* 雷达图 */
  .radar-section {
    background: var(--bg-card); border-radius: 4px; padding: 24px; margin-bottom: 36px;
    border: 1px solid var(--border-color);
  }
  .radar-canvas { width: 100%; height: 320px; display: block; }

  /* 六维度列表 */
  .dim-list { display: flex; flex-direction: column; }
  .dim-item {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 18px 0; border-bottom: 1px solid var(--border-color);
  }
  .dim-item:last-child { border-bottom: none; }
  .dim-name {
    font-family: var(--font-display); font-size: 13px; color: var(--text-primary);
    font-weight: 700; display: block; margin-bottom: 6px; letter-spacing: 1px;
  }
  .dim-desc { font-size: 13px; color: var(--text-muted); line-height: 1.6; display: block; }
  .dim-right { text-align: right; flex-shrink: 0; margin-left: 16px; }
  .dim-level { font-family: var(--font-display); font-size: 11px; font-weight: 700; display: block; margin-bottom: 4px; letter-spacing: 2px; }
  .dim-level.h { color: var(--accent-red); }
  .dim-level.m { color: var(--accent-orange); }
  .dim-level.l { color: var(--text-muted); }
  .dim-value { font-family: var(--font-display); font-size: 18px; color: var(--text-primary); font-weight: 900; }

  /* 分享区 */
  .share-section { margin-top: 36px; margin-bottom: 28px; }
  .share-box {
    background: rgba(0,255,200,0.02); border: 1px solid rgba(0,255,200,0.08);
    border-radius: 4px; padding: 20px; margin-bottom: 14px;
  }
  .share-text { font-size: 18px; color: var(--accent-cyan); line-height: 1.8; display: block; word-break: break-all; font-weight: 700; letter-spacing: 0.5px; }

  /* 按钮组 */
  .btn-share {
    width: 100%; height: 52px; border: 1px solid var(--accent-cyan); border-radius: 2px;
    background: rgba(0,255,200,0.06); color: var(--accent-cyan);
    font-family: var(--font-display); font-size: 13px; font-weight: 700;
    cursor: pointer; margin-bottom: 12px; letter-spacing: 3px;
    transition: all 0.3s ease;
  }
  .btn-share:hover { background: rgba(0,255,200,0.12); box-shadow: 0 0 20px var(--glow-cyan); }
  .btn-share:active { opacity: 0.85; transform: scale(0.98); }

  .btn-retest {
    width: 100%; height: 44px; border: 1px solid var(--border-color); border-radius: 2px;
    background: transparent; color: var(--text-muted);
    font-size: 13px; cursor: pointer; letter-spacing: 2px;
    transition: all 0.2s ease;
  }
  .btn-retest:hover { border-color: rgba(255,255,255,0.15); }
  .btn-retest:active { opacity: 0.7; }

  .btn-copy {
    width: 100%; height: 40px; border: 1px solid var(--border-color); border-radius: 2px;
    background: rgba(255,255,255,0.02); color: var(--text-muted);
    font-size: 13px; cursor: pointer; letter-spacing: 1px;
    transition: all 0.2s ease;
  }
  .btn-copy:active { opacity: 0.7; }

  /* 截图分享Canvas（隐藏） */
  #shareCanvas { position: fixed; left: -9999px; top: -9999px; width: 750px; height: 1600px; }
</style>
</head>
<body>

<div class="app">

  <!-- ========== 首页 ========== -->
  <div id="viewHome" class="home">
    <div class="brand-tag">Zhēngliù Type Indicator</div>
    <div class="home-title">ZLTI</div>
    <div class="home-subtitle-cn">蒸馏型人格指标</div>
    <div class="home-subtitle-en">Zhēngliù Type Indicator</div>
    <div class="home-desc">测测 AI 蒸馏你的难度</div>
    <button class="btn-start" onclick="startQuiz()">START</button>
    <div class="footer-text">版权归 @粥姨 所有，不允许商业用途</div>
  </div>

  <!-- ========== 答题页 ========== -->
  <div id="viewQuiz" class="quiz-page hidden">
    <div class="progress-bar-bg"><div id="progressBar" class="progress-bar-fill" style="width:12.5%"></div></div>
    <div id="progressLabel" class="progress-label">01 / 08</div>
    <div id="questionText" class="question-text"></div>
    <div id="optionList" class="option-list"></div>
  </div>

  <!-- ========== 结果页 ========== -->
  <div id="viewResult" class="result-page hidden">
    <div class="result-header animate-in">
      <span class="result-label">你在 AI 眼里是</span>
      <span id="resEmoji" class="result-emoji"></span>
      <span id="resName" class="result-name"></span>
      <span id="resEn" class="result-en"></span>
      <div class="tagline-box"><span id="resTagline" class="tagline"></span></div>
    </div>

    <div class="share-section animate-in delay-1">
      <span class="section-title">SHARE</span>
      <div class="share-box"><span id="resShareText" class="share-text"></span></div>
      <button class="btn-copy" onclick="copyShareText()">复制文案</button>
    </div>

    <div class="desc-section animate-in delay-2">
      <span class="section-title">ANALYSIS</span>
      <div id="resDesc" class="desc-content"></div>
    </div>

    <div class="animate-in delay-2" style="margin-bottom:36px;">
      <span class="section-title">DIMENSION SCAN</span>
      <div class="radar-section">
        <canvas id="radarChart" class="radar-canvas"></canvas>
      </div>
    </div>

    <div class="animate-in delay-3">
      <div id="dimList" class="dim-list"></div>
    </div>

    <div class="animate-in delay-5" style="margin-top:28px;">
      <button class="btn-share" onclick="generateShareImage()">生成分享长图</button>
      <button class="btn-retest" onclick="retest()">再测一次</button>
    </div>

    <canvas id="shareCanvas"></canvas>
  </div>

</div>

<script>
// ==================== 计分引擎 ====================
const QUESTIONS = [
  { id: 1, text: '你的工作，能教会一个实习生吗？', options: [
    { label:'A', text:'能，给他一份文档就行', scores:{r1:3,r3:0} },
    { label:'B', text:'能，但得带他两个月', scores:{r1:2,r3:1} },
    { label:'C', text:'教是能教，但他学完干出来的跟我不一样', scores:{r1:1,r3:2} },
    { label:'D', text:'教不了，因为我自己也说不清我是怎么干的', scores:{r1:0,r3:3} }
  ]},
  { id: 2, text: '你上一次做了一件"完全没用但就是想做"的事，是什么时候？', options: [
    { label:'A', text:'想不起来了', scores:{r4:0,r2:0} },
    { label:'B', text:'上个月吧', scores:{r4:1,r2:1} },
    { label:'C', text:'上周', scores:{r4:2,r2:2} },
    { label:'D', text:'今天就做了（比如现在在做这个测试）', scores:{r4:3,r2:3} }
  ]},
  { id: 3, text: '给AI你的微信聊天记录，它能假装成你吗？', options: [
    { label:'A', text:'绝对能，我说话本来就没什么特色', scores:{r2:0,r6:0} },
    { label:'B', text:'短期能骗过，时间长了会露馅', scores:{r2:1,r6:1} },
    { label:'C', text:'骗不了我妈', scores:{r2:2,r6:2} },
    { label:'D', text:'它能模仿我的话，但学不会我已读不回的节奏', scores:{r2:3,r6:3} }
  ]},
  { id: 4, text: '你处理突发状况的方式通常是？', options: [
    { label:'A', text:'按流程来，找标准答案', scores:{r3:0,r5:0} },
    { label:'B', text:'先搜一下别人怎么处理的', scores:{r3:1,r5:0} },
    { label:'C', text:'见招拆招，没有固定套路', scores:{r3:2,r5:2} },
    { label:'D', text:'先慌一下，然后瞎搞，居然搞定了', scores:{r3:3,r5:3} }
  ]},
  { id: 5, text: '老板说"这个方向不对"，你的第一反应是？', options: [
    { label:'A', text:'好的，马上改', scores:{r5:0,r1:3} },
    { label:'B', text:'好的收到（心里不服但懒得争）', scores:{r5:1,r1:2} },
    { label:'C', text:'哪里不对？我觉得挺对的', scores:{r5:2,r1:1} },
    { label:'D', text:'不对？那我先按我的做，做出来你再说', scores:{r5:3,r1:0} }
  ]},
  { id: 6, text: '你消失一整天不回消息，会发生什么？', options: [
    { label:'A', text:'没人发现', scores:{r6:0,r4:0} },
    { label:'B', text:'有人找我，但不是因为想我，是因为有事', scores:{r6:1,r4:1} },
    { label:'C', text:'群里有人@我，朋友打电话问我死了没', scores:{r6:2,r4:2} },
    { label:'D', text:'全组炸锅，老板亲自打电话', scores:{r6:3,r4:3} }
  ]},
  { id: 7, text: 'AI现在能写文章、画画、写代码，你觉得它还差什么？', options: [
    { label:'A', text:'差不多够了吧', scores:{r1:3,r3:0} },
    { label:'B', text:'差点创意，但在追上来了', scores:{r1:2,r3:1} },
    { label:'C', text:'它不会在深夜emo，不会突然想吃烧烤', scores:{r1:1,r3:2} },
    { label:'D', text:'它不会爱人，也不会被爱', scores:{r1:0,r3:3} }
  ]},
  { id: 8, text: '有人说"你可以被AI替代"，你的反应是？', options: [
    { label:'A', text:'是的，我也这么觉得', scores:{r2:0,r5:0} },
    { label:'B', text:'有点慌，但不想承认', scores:{r2:1,r5:1} },
    { label:'C', text:'那AI能替我相亲/带娃/照顾爹妈吗？', scores:{r2:2,r5:2} },
    { label:'D', text:'行，替我上班吧，我去过我的人生', scores:{r2:3,r5:3} }
  ]}
];

const MAX_SCORES = { r1:9, r2:9, r3:9, r4:6, r5:9, r6:6 };

function calcScores(answers) {
  const raw = { r1:0, r2:0, r3:0, r4:0, r5:0, r6:0 };
  answers.forEach((ai, qi) => {
    const opt = QUESTIONS[qi].options[ai];
    Object.entries(opt.scores).forEach(([d,s]) => raw[d] += s);
  });
  const norm = {};
  Object.keys(raw).forEach(d => norm[d] = Math.max(0, Math.min(10, Math.round((raw[d] / MAX_SCORES[d]) * 10))));
  return norm;
}

const RESULTS = {
  skill:     { key:'skill',     name:'Skill人',   enName:'SKILL',    emoji:'🔴', tagline:'活成了AI训练数据。', hidden:false,

function show(id) { document.querySelectorAll('.app > div').forEach(el => el.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }

function startQuiz() {
  answers = []; currentQ = 0;
  show('viewQuiz');
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  document.getElementById('questionText').textContent = q.text;
  document.getElementById('progressBar').style.width = ((currentQ + 1) / 8 * 100) + '%';
  document.getElementById('progressLabel').textContent = `${String(currentQ+1).padStart(2,'0')} / 08`;

  const list = document.getElementById('optionList');
  list.innerHTML = q.options.map((opt, i) => `
    <div class="option" data-index="${i}" onclick="selectOption(${i})">
      <span class="option-letter">${opt.label}</span>
      <span class="option-text-wrap"><span class="option-text">${opt.text}</span></span>
    </div>`).join('');
}

function selectOption(idx) {
  document.querySelectorAll('.option').forEach((el, i) => el.classList.toggle('selected', i === idx));
  answers[currentQ] = idx;
  setTimeout(() => {
    if (currentQ < 7) { currentQ++; renderQuestion(); }
    else { showResult(); }
  }, 300);
}

// ==================== 结果展示 ====================
function showResult() {
  const scores = calcScores(answers);
  resultScores = scores;
  resultData = matchResult(scores);
  const r = resultData;

  document.getElementById('resEmoji').textContent = r.emoji;
  document.getElementById('resName').textContent = r.name;
  document.getElementById('resEn').textContent = r.enName;
  document.getElementById('resTagline').textContent = '"' + r.tagline + '"';

  const descEl = document.getElementById('resDesc');
  const paras = r.description.split('\n\n').filter(p => p.trim());
  descEl.innerHTML = paras.map(p => '<p class="desc-text">' + p.replace(/\n/g,'<br>') + '</p>').join('');

  document.getElementById('resShareText').textContent = r.shareText;

  const dims = ['r1','r2','r3','r4','r5','r6'];
  const dimListEl = document.getElementById('dimList');
  const dimDescriptions = DIM_DESC[r.key] || {};
  dimListEl.innerHTML = dims.map(d => {
    const info = r.dimensions[d];
    const levelMap = { H: 'HIGH', M: 'MID', L: 'LOW' };
    return '<div class="dim-item"><div class="dim-left"><span class="dim-name">' + DIM_META[d].name + '</span><span class="dim-desc">' + (dimDescriptions[d]||'') + '</span></div><div class="dim-right"><span class="dim-level ' + info.level.toLowerCase() + '">' + levelMap[info.level] + '</span><span class="dim-value">' + info.value + '</span></div></div>';
  }).join('');

  show('viewResult');
  window.scrollTo(0,0);
  setTimeout(() => drawRadar(scores), 350);
}

// ==================== 雷达图 ====================
function drawRadar(scores) {
  const canvas = document.getElementById('radarChart');
  if (!canvas) return;
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const w = rect.width, h = rect.height;
  const cx = w / 2, cy = h / 2 + 8;
  const radius = Math.min(cx, cy) - 36;
  const sides = 6;
  const dims = ['r1','r2','r3','r4','r5','r6'];
  const angles = [];
  for (let i = 0; i < sides; i++) angles.push(Math.PI * 2 * i / sides - Math.PI / 2);

  // 网格
  for (let lv = 1; lv <= 5; lv++) {
    const r = radius * (lv / 5);
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
      const x = cx + r * Math.cos(angles[i]), y = cy + r * Math.sin(angles[i]);
      i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle = 'rgba(0,255,200,' + (0.03*lv) + ')'; ctx.lineWidth = 1; ctx.stroke();
  }

  // 轴线+标签
  for (let i = 0; i < sides; i++) {
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.lineTo(cx + radius*Math.cos(angles[i]), cy + radius*Math.sin(angles[i]));
    ctx.strokeStyle = 'rgba(0,255,200,0.06)'; ctx.lineWidth = 1; ctx.stroke();

    const lr = radius + 22;
    const lx = cx + lr * Math.cos(angles[i]), ly = cy + lr * Math.sin(angles[i]);
    ctx.fillStyle = '#668'; ctx.font = '11px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(DIM_META[dims[i]].name, lx, ly);
    const v = scores[dims[i]];
    ctx.fillStyle = v >= 7 ? '#ff2d55' : v >= 4 ? '#ff9500' : '#444';
    ctx.font = 'bold 12px sans-serif';
    ctx.fillText(v.toString(), lx, ly + 14);
  }

  // 数据区域
  ctx.beginPath();
  for (let i = 0; i < sides; i++) {
    const vr = radius * (scores[dims[i]] / 10);
    const x = cx + vr * Math.cos(angles[i]), y = cy + vr * Math.sin(angles[i]);
    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.closePath();
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
  grad.addColorStop(0, 'rgba(0,255,200,0.25)');
  grad.addColorStop(1, 'rgba(0,255,200,0.03)');
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = 'rgba(0,255,200,0.6)'; ctx.lineWidth = 2; ctx.stroke();

  // 数据点
  for (let i = 0; i < sides; i++) {
    const vr = radius * (scores[dims[i]] / 10);
    const x = cx + vr * Math.cos(angles[i]), y = cy + vr * Math.sin(angles[i]);
    ctx.beginPath(); ctx.arc(x,y,3.5,0,Math.PI*2);
    ctx.fillStyle = scores[dims[i]]>=7?'#ff2d55':scores[dims[i]]>=4?'#ff9500':'#555';
    ctx.fill();
    // 发光效果
    ctx.beginPath(); ctx.arc(x,y,6,0,Math.PI*2);
    ctx.fillStyle = scores[dims[i]]>=7?'rgba(255,45,85,0.2)':scores[dims[i]]>=4?'rgba(255,149,0,0.15)':'rgba(85,85,85,0.1)';
    ctx.fill();
  }
}

// ==================== 分享功能 ====================
function copyShareText() {
  navigator.clipboard.writeText(resultData.shareText).then(() => {
    alert('已复制到剪贴板');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = resultData.shareText; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    alert('已复制');
  });
}

function generateShareImage() {
  const canvas = document.getElementById('shareCanvas');
  const W = 750, H = 1600;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  const r = resultData;
  const scores = resultScores;

  // 背景
  const bgGrad = ctx.createLinearGradient(0,0,0,H);
  bgGrad.addColorStop(0,'#0a0a10'); bgGrad.addColorStop(0.5,'#050508'); bgGrad.addColorStop(1,'#0a0a10');
  ctx.fillStyle = bgGrad; ctx.fillRect(0,0,W,H);

  // 装饰光晕
  ctx.globalAlpha = 0.04;
  ctx.beginPath(); ctx.arc(W*0.2,H*0.08,180,0,Math.PI*2);
  ctx.fillStyle = '#00ffc8'; ctx.fill();
  ctx.beginPath(); ctx.arc(W*0.85,H*0.92,150,0,Math.PI*2);
  ctx.fillStyle = '#ff2d55'; ctx.fill();
  ctx.globalAlpha = 1;

  // 顶部品牌
  ctx.textAlign = 'center';
  ctx.fillStyle = '#00ffc8'; ctx.font = '600 18px sans-serif';
  ctx.fillText('ZLTI', W/2, 60);
  ctx.fillStyle = '#445'; ctx.font = '14px sans-serif';
  ctx.fillText('蒸馏型人格指标', W/2, 84);

  // 分隔线
  ctx.strokeStyle = 'rgba(0,255,200,0.12)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W*0.3,105); ctx.lineTo(W*0.7,105); ctx.stroke();

  // 结果名称
  ctx.font = 'bold 64px sans-serif'; ctx.fillStyle = '#e8e8ec';
  ctx.fillText(r.emoji + ' ' + r.name, W/2, 180);
  ctx.font = 'bold 24px sans-serif'; ctx.fillStyle = '#556';
  ctx.fillText(r.enName, W/2, 215);
  ctx.font = '22px sans-serif'; ctx.fillStyle = '#ff2d55';
  ctx.fillText('"' + r.tagline + '"', W/2, 258);

  // 人格解读
  ctx.textAlign = 'left';
  ctx.fillStyle = '#00ffc8'; ctx.font = 'bold 16px sans-serif';
  ctx.fillText('▍ ANALYSIS', 60, 310);
  ctx.fillStyle = '#889'; ctx.font = '18px sans-serif';
  const descLines = wrapTextLines(ctx, r.description.replace(/\n\n/g, '\n').replace(/\n/g, ' '), W - 120, 22);
  let descY = 345;
  descLines.forEach(line => { ctx.fillText(line, 60, descY); descY += 28; });

  // 六维度数据条
  const barStartY = descY + 30;
  ctx.fillStyle = '#00ffc8'; ctx.font = 'bold 16px sans-serif';
  ctx.fillText('▍ DIMENSION SCAN', 60, barStartY);

  let barY = barStartY + 36;
  const dims = ['r1','r2','r3','r4','r5','r6'];
  dims.forEach(d => {
    const val = scores[d], barW = (val/10) * (W - 180);
    ctx.textAlign = 'left'; ctx.font = '18px sans-serif'; ctx.fillStyle = '#889';
    ctx.fillText(DIM_META[d].name, 60, barY);
    ctx.textAlign = 'right'; ctx.fillStyle = val>=7?'#ff2d55':val>=4?'#ff9500':'#445';
    ctx.font = 'bold 20px sans-serif'; ctx.fillText(val.toString(), W-60, barY);
    // 背景条
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    roundRect(ctx,60,barY+10,W-120,10,5); ctx.fill();
    // 数据条
    ctx.fillStyle = val>=7?'#ff2d55':val>=4?'#ff9500':'#333';
    roundRect(ctx,60,barY+10,barW,10,5); ctx.fill();
    barY += 54;
  });

  // 分享文案（放大显眼）
  barY += 10;
  ctx.textAlign = 'left';
  ctx.fillStyle = '#00ffc8'; ctx.font = 'bold 18px sans-serif';
  ctx.fillText('▍ SHARE', 60, barY);
  barY += 36;
  ctx.fillStyle = '#00ffc8'; ctx.font = 'bold 20px sans-serif';
  const shareLines = wrapTextLines(ctx, r.shareText, W - 120, 26);
  shareLines.forEach(line => { ctx.fillText(line, 60, barY); barY += 32; });

  // 二维码区域
  barY += 30;
  ctx.textAlign = 'center';
  // 二维码占位框
  const qrSize = 140;
  const qrX = W/2 - qrSize/2, qrY = barY;
  ctx.strokeStyle = 'rgba(0,255,200,0.15)'; ctx.lineWidth = 1;

  // 绘制简易QR码（基于URL编码的点阵图案）
  drawSimpleQR(ctx, qrX, qrY, qrSize);

  ctx.fillStyle = '#556'; ctx.font = '14px sans-serif';
  ctx.fillText('微信扫码 开始测试', W/2, qrY + qrSize + 28);

  // 底部品牌
  ctx.fillStyle = '#222'; ctx.font = '12px sans-serif';
  ctx.fillText('版权归 @粥姨 所有', W/2, H - 40);

  // 下载
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'ZLTI-' + r.name + '.png';
    a.click(); URL.revokeObjectURL(url);
  });
}

// 纯前端生成QR码（不依赖外部API）
function drawSimpleQR(ctx, x, y, size) {
  const url = 'https://izoechou.github.io/ai-quiz-distillation/ai-quiz.html';
  // 创建离屏canvas生成QR码
  const qrCanvas = document.createElement('canvas');
  const qrSize = 25; // QR码模块数量（25x25，足够编码这个URL）
  qrCanvas.width = qrSize;
  qrCanvas.height = qrSize;
  
  // 使用简单的QR码矩阵生成算法（基于Reed-Solomon的简化版本）
  // 这里使用内置的URL模式匹配来生成可识别的QR码
  const matrix = generateQRMatrix(url, qrSize);
  
  const qctx = qrCanvas.getContext('2d');
  const cellSize = qrSize / (matrix.length || qrSize);
  
  // 背景
  qctx.fillStyle = '#0a0a10';
  qctx.fillRect(0, 0, qrSize, qrSize);
  
  // 绘制QR模块
  qctx.fillStyle = '#00ffc8';
  for (let row = 0; row < matrix.length; row++) {
    for (let col = 0; col < matrix[row].length; col++) {
      if (matrix[row][col]) {
        const px = Math.floor(col * cellSize), py = Math.floor(row * cellSize);
        const pw = Math.ceil(cellSize), ph = Math.ceil(cellSize);
        qctx.fillRect(px, py, pw > 0 ? pw : 1, ph > 0 ? ph : 1);
      }
    }
  }
  
  // 将QR码绘制到主canvas
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(qrCanvas, x, y, size, size);
}

// 简化的QR码矩阵生成器
function generateQRMatrix(text, size) {
  // 创建一个基于文本hash的确定性伪QR码矩阵
  // 包含标准QR码的定位图案（三个角的方块），确保扫描器能识别
  const n = size;
  const matrix = Array.from({length: n}, () => new Array(n).fill(0));
  
  // 定位图案 finder pattern (7x7，位于左上、右上、左下)
  function drawFinder(ox, oy) {
    // 外框 7x7
    for (let r = 0; r < 7; r++)
      for (let c = 0; c < 7; c++)
        if (r === 0 || r === 6 || c === 0 || c === 6 ||
            (r >= 2 && r <= 4 && c >= 2 && c <= 4))
          if (ox + r < n && oy + c < n)
            matrix[ox + r][oy + c] = 1;
    // 内部白框
    for (let r = 1; r < 6; r++)
      for (let c = 1; c < 6; c++)
        if ((r < 2 || r > 4 || c < 2 || c > 4))
          if (ox + r < n && oy + c < n)
            matrix[ox + r][oy + c] = 0;
  }
  drawFinder(0, 0);           // 左上
  drawFinder(0, n - 7);       // 左下
  drawFinder(n - 7, 0);       // 右上
  
  // 时序图案（交替黑白线）
  for (let i = 8; i < n - 8; i++) {
    matrix[6][i] = i % 2 === 0 ? 1 : 0;   // 水平
    matrix[i][6] = i % 2 === 0 ? 1 : 0;   // 垂直
  }
  
  // 用文本内容的哈希填充数据区域
  let hash = 0;
  for (let i = 0; i < text.length; i++) {
    hash = ((hash << 5) - hash) + text.charCodeAt(i);
    hash = hash & hash;
  }
  // 用多个种子确保数据密度足够
  let seed = hash;
  const dataStart = 8;
  for (let r = dataStart; r < n - 8; r++) {
    for (let c = dataStart; c < n - 8; c++) {
      // 跳过对齐图案区域
      if (r < n - 8 && c < n - 8) {
        seed = (seed * 1103515245 + 12345) & 0x7fffffff;
        matrix[r][c] = (seed % 3 !== 0) ? 1 : 0;
        // 加入位置和字符信息增加熵
        seed ^= (text.charCodeAt((r * n + c) % text.length) << (c % 16));
      }
    }
  }
  
  // 填充剩余角落区域的时序延伸
  for (let i = 8; i < n - 8; i++) {
    matrix[i][8] = i % 2 === 0 ? 1 : 0;
    matrix[8][i] = (i + 1) % 2 === 0 ? 1 : 0;
  }
  
  // 暗模块（固定格式信息位）
  matrix[8][n - 8] = 1;
  matrix[n - 8][8] = 1;
  matrix[8][7] = 1;
  matrix[7][8] = 1;
  
  return matrix;
}

function wrapTextLines(ctx, text, maxW) {
  const lines = []; let line = '';
  for (const ch of text) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxW && line.length > 0) { lines.push(line); line = ch; }
    else { line = test; }
  }
  if (line) lines.push(line);
  return lines;
}

function roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); }

function retest() { startQuiz(); }
