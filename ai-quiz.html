<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI替代倒计时 — 测测你的AI替代类型</title>
<style>
  /* ===== 全局重置 ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #111118;
    --bg-card: rgba(255,255,255,0.04);
    --border-color: rgba(255,255,255,0.08);
    --text-primary: #fff;
    --text-secondary: #ccc;
    --text-muted: #888;
    --accent-red: #ff4757;
    --accent-orange: #ffa502;
    --accent-gradient: linear-gradient(135deg, #ff4757, #ffa502);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg-primary);
    color: var(--text-secondary);
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app { max-width: 480px; margin: 0 auto; padding: 20px 16px 60px; }
  
  .hidden { display: none !important; }

  /* ===== 首页 ===== */
  .home { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 80px); text-align: center; padding-top: 60px; }
  
  .home-title { font-size: 28px; font-weight: 900; color: var(--text-primary); letter-spacing: 3px; margin-bottom: 8px; }
  
  .home-subtitle { font-size: 48px; font-weight: 900; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 6px; margin-bottom: 12px; }
  
  .home-desc { font-size: 15px; color: var(--text-muted); margin-bottom: 40px; line-height: 1.8; }
  
  .btn-start {
    width: 100%; height: 56px; border: none; border-radius: 28px;
    background: var(--accent-gradient); color: #fff;
    font-size: 18px; font-weight: bold; cursor: pointer;
    box-shadow: 0 8px 32px rgba(255,71,87,0.35);
    transition: all 0.2s ease;
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(255,71,87,0.45); }
  .btn-start:active { transform: scale(0.97); opacity: 0.9; }

  .footer-text { position: fixed; bottom: 24px; left: 0; right: 0; text-align: center; font-size: 12px; color: #333; }

  /* ===== 答题页 ===== */
  .quiz-page { padding-top: 16px; }
  
  .progress-bar-bg { width: 100%; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.08); margin-bottom: 8px; }
  .progress-bar-fill { height: 100%; border-radius: 3px; background: var(--accent-gradient); transition: width 0.3s ease; }
  .progress-label { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; text-align: right; }

  .question-text { font-size: 22px; color: var(--text-primary); font-weight: bold; line-height: 1.5; margin-bottom: 28px; letter-spacing: 0.5px; }

  .option-list { display: flex; flex-direction: column; gap: 14px; }

  .option {
    background: var(--bg-card); border: 1.5px solid transparent;
    border-radius: 16px; padding: 20px 20px; cursor: pointer;
    transition: all 0.25s ease; display: flex; align-items: flex-start; gap: 16px;
  }
  .option:hover { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); }
  .option.selected { border-color: var(--accent-red); background: rgba(255,71,87,0.08); }
  .option:active { transform: scale(0.98); }

  .option-letter {
    width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: bold; color: var(--text-muted);
    background: rgba(255,255,255,0.06); transition: all 0.25s ease;
  }
  .option.selected .option-letter { background: var(--accent-red); color: #fff; }

  .option-text-wrap { flex: 1; }
  .option-text { font-size: 16px; color: var(--text-secondary); line-height: 1.55; }

  /* ===== 结果页 ===== */
  .result-page { padding-top: 8px; }

  /* 结果头部 */
  .result-header { text-align: center; margin-bottom: 36px; padding-top: 16px; }
  .result-label { font-size: 16px; color: #999; display: block; margin-bottom: 18px; letter-spacing: 1px; }
  .result-emoji { font-size: 72px; display: block; margin-bottom: 10px; line-height: 1; }
  .result-name { font-size: 44px; font-weight: 900; color: #fff; display: block; letter-spacing: 4px; line-height: 1.2; margin-bottom: 4px; }
  .result-en { font-size: 22px; color: #888; letter-spacing: 6px; display: block; margin-bottom: 16px; font-weight: bold; }
  .tagline-box { background: rgba(255,71,87,0.08); border-radius: 14px; padding: 12px 22px; display: inline-block; }
  .tagline { font-size: 17px; color: #ff6b81; font-style: italic; line-height: 1.5; }

  /* 区块标题 */
  .section-title {
    font-size: 19px; font-weight: bold; color: #fff; display: block;
    margin-bottom: 18px; position: relative; padding-left: 14px;
  }
  .section-title::before {
    content: ''; position: absolute; left: 0; top: 2px;
    width: 4px; height: 19px; border-radius: 2px;
    background: var(--accent-gradient);
  }

  /* 人格解读 */
  .desc-section { margin-bottom: 36px; }
  .desc-content {
    background: var(--bg-card); border-radius: 18px; padding: 24px;
    border: 1px solid var(--border-color);
  }
  .desc-text { font-size: 16px; color: #ccc; line-height: 1.9; display: block; margin-bottom: 18px; }
  .desc-text:last-child { margin-bottom: 0; }

  /* 雷达图区域 */
  .radar-section { background: var(--bg-card); border-radius: 18px; padding: 24px; margin-bottom: 32px; border: 1px solid var(--border-color); }
  .radar-canvas { width: 100%; height: 320px; display: block; }

  /* 六维度评分列表 */
  .dim-list { display: flex; flex-direction: column; }
  .dim-item {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 18px 0; border-bottom: 1px solid var(--border-color);
  }
  .dim-item:last-child { border-bottom: none; }
  .dim-name { font-size: 16px; color: #fff; font-weight: bold; display: block; margin-bottom: 4px; }
  .dim-desc { font-size: 13px; color: #888; line-height: 1.55; display: block; }
  .dim-right { text-align: right; flex-shrink: 0; margin-left: 16px; }
  .dim-level { font-size: 14px; font-weight: bold; display: block; margin-bottom: 2px; }
  .dim-level.H { color: var(--accent-red); }
  .dim-level.M { color: var(--accent-orange); }
  .dim-level.L { color: #555; }
  .dim-value { font-size: 16px; color: #bbb; font-weight: bold; }

  /* 分享区 */
  .share-section { margin-top: 32px; margin-bottom: 24px; }
  .share-box { background: rgba(255,174,2,0.06); border: 1px solid rgba(255,174,2,0.15); border-radius: 14px; padding: 18px; margin-bottom: 14px; }
  .share-text { font-size: 15px; color: #ddd; line-height: 1.65; display: block; word-break: break-all; }

  /* 按钮 */
  .btn-share {
    width: 100%; height: 52px; border: none; border-radius: 26px;
    background: var(--accent-gradient); color: #fff;
    font-size: 17px; font-weight: bold; cursor: pointer; margin-bottom: 12px;
    transition: all 0.2s ease;
  }
  .btn-share:active { opacity: 0.85; transform: scale(0.98); }

  .btn-retest {
    width: 100%; height: 44px; border: 1px solid var(--border-color); border-radius: 22px;
    background: transparent; color: #666; font-size: 14px; cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-retest:active { opacity: 0.7; }

  .btn-copy {
    width: 100%; height: 40px; border: 1px solid var(--border-color); border-radius: 20px;
    background: rgba(255,255,255,0.06); color: #ccc; font-size: 14px; cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-copy:active { opacity: 0.7; }

  /* 动画 */
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  .animate-in { animation: fadeInUp 0.45s ease forwards; }
  .delay-1 { animation-delay: 0.1s; opacity: 0; }
  .delay-2 { animation-delay: 0.2s; opacity: 0; }
  .delay-3 { animation-delay: 0.3s; opacity: 0; }
  .delay-4 { animation-delay: 0.4s; opacity: 0; }
  .delay-5 { animation-delay: 0.5s; opacity: 0; }

  /* 截图分享Canvas（隐藏） */
  #shareCanvas { position: fixed; left: -9999px; top: -9999px; width: 750px; height: 1200px; }
</style>
</head>
<body>

<div class="app">

  <!-- ========== 首页 ========== -->
  <div id="viewHome" class="home">
    <div class="hero">
      <div class="home-title">打工人被蒸馏难度测试</div>
      <p class="home-desc">2 分钟，吓吓你。</p>
      <button class="btn-start" onclick="startQuiz()">开始测试</button>
    </div>
    <div class="footer-text">版权归 @粥姨 所有，不允许商业用途</div>
  </div>

  <!-- ========== 答题页 ========== -->
  <div id="viewQuiz" class="quiz-page hidden">
    <div class="progress-bar-bg"><div id="progressBar" class="progress-bar-fill" style="width:12.5%"></div></div>
    <div id="progressLabel" class="progress-label">1 / 8</div>
    <div id="questionText" class="question-text"></div>
    <div id="optionList" class="option-list"></div>
  </div>

  <!-- ========== 结果页 ========== -->
  <div id="viewResult" class="result-page hidden">
    <!-- 结果头部 -->
    <div class="result-header animate-in">
      <span class="result-label">你在 AI 眼里是</span>
      <span id="resEmoji" class="result-emoji"></span>
      <span id="resName" class="result-name"></span>
      <span id="resEn" class="result-en"></span>
      <div class="tagline-box"><span id="resTagline" class="tagline"></span></div>
    </div>

    <!-- 人格解读 -->
    <div class="desc-section animate-in delay-1">
      <span class="section-title">该人格的简单解读</span>
      <div id="resDesc" class="desc-content"></div>
    </div>

    <!-- 六维度雷达图 -->
    <div class="animate-in delay-2" style="margin-bottom:32px;">
      <span class="section-title">六维度扫描</span>
      <div class="radar-section">
        <canvas id="radarChart" class="radar-canvas"></canvas>
      </div>
    </div>

    <!-- 六维度评分列表 -->
    <div class="animate-in delay-3">
      <div id="dimList" class="dim-list"></div>
    </div>

    <!-- 分享文案 -->
    <div class="share-section animate-in delay-4">
      <span class="section-title">分享文案</span>
      <div class="share-box"><span id="resShareText" class="share-text"></span></div>
      <button class="btn-copy" onclick="copyShareText()">📋 复制文案</button>
    </div>

    <!-- 操作按钮 -->
    <div class="animate-in delay-5" style="margin-top:28px;">
      <button class="btn-share" onclick="generateShareImage()">📸 生成长图分享</button>
      <button class="btn-retest" onclick="retest()">再测一次</button>
    </div>
    
    <!-- 隐藏的分享画布 -->
    <canvas id="shareCanvas"></canvas>
  </div>

</div>

<script>
// ==================== 计分引擎（从小程序quiz-engine.js移植）====================

const QUESTIONS = [
  { id: 1, text: '你的工作，能教会一个实习生吗？', options: [
    { label:'A', text:'能，给他一份文档就行', scores:{r1:3,r3:0} },
    { label:'B', text:'能，但得带他两个月', scores:{r1:2,r3:1} },
    { label:'C', text:'教是能教，但他学完干出来的跟我不一样', scores:{r1:1,r3:2} },
    { label:'D', text:'教不了，因为我自己也说不清我是怎么干的', scores:{r1:0,r3:3} }
  ]},
  { id: 2, text: '你上一次做了一件"完全没用但就是想做"的事，是什么时候？', options: [
    { label:'A', text:'想不起来了', scores:{r4:0,r2:0} },
    { label:'B', text:'上个月吧', scores:{r4:1,r2:1} },
    { label:'C', text:'上周', scores:{r4:2,r2:2} },
    { label:'D', text:'今天就做了（比如现在在做这个测试）', scores:{r4:3,r2:3} }
  ]},
  { id: 3, text: '给AI你的微信聊天记录，它能假装成你吗？', options: [
    { label:'A', text:'绝对能，我说话本来就没什么特色', scores:{r2:0,r6:0} },
    { label:'B', text:'短期能骗过，时间长了会露馅', scores:{r2:1,r6:1} },
    { label:'C', text:'骗不了我妈', scores:{r2:2,r6:2} },
    { label:'D', text:'它能模仿我的话，但学不会我已读不回的节奏', scores:{r2:3,r6:3} }
  ]},
  { id: 4, text: '你处理突发状况的方式通常是？', options: [
    { label:'A', text:'按流程来，找标准答案', scores:{r3:0,r5:0} },
    { label:'B', text:'先搜一下别人怎么处理的', scores:{r3:1,r5:0} },
    { label:'C', text:'见招拆招，没有固定套路', scores:{r3:2,r5:2} },
    { label:'D', text:'先慌一下，然后瞎搞，居然搞定了', scores:{r3:3,r5:3} }
  ]},
  { id: 5, text: '老板说"这个方向不对"，你的第一反应是？', options: [
    { label:'A', text:'好的，马上改', scores:{r5:0,r1:3} },
    { label:'B', text:'好的收到（心里不服但懒得争）', scores:{r5:1,r1:2} },
    { label:'C', text:'哪里不对？我觉得挺对的', scores:{r5:2,r1:1} },
    { label:'D', text:'不对？那我先按我的做，做出来你再说', scores:{r5:3,r1:0} }
  ]},
  { id: 6, text: '你消失一整天不回消息，会发生什么？', options: [
    { label:'A', text:'没人发现', scores:{r6:0,r4:0} },
    { label:'B', text:'有人找我，但不是因为想我，是因为有事', scores:{r6:1,r4:1} },
    { label:'C', text:'群里有人@我，朋友打电话问我死了没', scores:{r6:2,r4:2} },
    { label:'D', text:'全组炸锅，老板亲自打电话', scores:{r6:3,r4:3} }
  ]},
  { id: 7, text: 'AI现在能写文章、画画、写代码，你觉得它还差什么？', options: [
    { label:'A', text:'差不多够了吧', scores:{r1:3,r3:0} },
    { label:'B', text:'差点创意，但在追上来了', scores:{r1:2,r3:1} },
    { label:'C', text:'它不会在深夜emo，不会突然想吃烧烤', scores:{r1:1,r3:2} },
    { label:'D', text:'它不会爱人，也不会被爱', scores:{r1:0,r3:3} }
  ]},
  { id: 8, text: '有人说"你可以被AI替代"，你的反应是？', options: [
    { label:'A', text:'是的，我也这么觉得', scores:{r2:0,r5:0} },
    { label:'B', text:'有点慌，但不想承认', scores:{r2:1,r5:1} },
    { label:'C', text:'那AI能替我相亲/带娃/照顾爹妈吗？', scores:{r2:2,r5:2} },
    { label:'D', text:'行，替我上班吧，我去过我的人生', scores:{r2:3,r5:3} }
  ]}
];

const MAX_SCORES = { r1:9, r2:9, r3:9, r4:6, r5:9, r6:6 };

function calcScores(answers) {
  const raw = { r1:0, r2:0, r3:0, r4:0, r5:0, r6:0 };
  answers.forEach((ai, qi) => {
    const opt = QUESTIONS[qi].options[ai];
    Object.entries(opt.scores).forEach(([d,s]) => raw[d] += s);
  });
  const norm = {};
  Object.keys(raw).forEach(d => norm[d] = Math.max(0, Math.min(10, Math.round((raw[d] / MAX_SCORES[d]) * 10))));
  return norm;
}

const RESULTS = {
  skill:     { key:'skill',     name:'Skill人',   enName:'SKILL',    emoji:'🔴', tagline:'活成了AI训练数据。', hidden:false,
    description:`你活得太标准了。几点干什么、怎么干、干到什么程度，全能写成操作手册。事实上你可能已经写了。\n\n别人还在纠结"我的工作有没有意义"，你已经把自己活成了一份完美的训练数据。日报比代码文档还规范，流程比自动化脚本还丝滑。AI看完你的工作记录直接哭了——感动的，因为终于遇到一个不需要理解、只需要复制粘贴的人了。\n\n隔壁公司已经拿离职员工的数据训练AI分身了。你连离职都不用——你在职的每一天，就是行走的训练集。网友说得好："数据提取完了，你可以走了。"散是打工人，聚是Token。\n\n你最大的问题不是"会被替代"。是你太忙了，忙到忘了自己除了"有用"，还可以"有趣"。`,
    dimensions: { r1:{level:'H',value:9}, r2:{level:'L',value:2}, r3:{level:'L',value:2}, r4:{level:'L',value:2}, r5:{level:'L',value:2}, r6:{level:'L',value:2} },
    shareText:'AI发来替代通知，我看了一眼——原来我早就是行走的训练集了。"散是打工人，聚是Token"。你呢？→' },

  flat:      { key:'flat',      name:'摆烂王',   enName:'FLAT',     emoji:'⚫', tagline:'AI发来替代通知，你看了，翻了个身。', hidden:false,
    description:`你不是不知道AI在来。你知道。你看了新闻，刷了热搜，收藏了三篇"如何在AI时代保持竞争力"的文章。然后你继续躺着了。\n\n你的焦虑方式属于高级焦虑——不是不知道火烧到哪了，是觉得起来灭火太累了。\n\n你对AI的态度跟你对所有危机的态度一样：已读不回，静观其变，实在不行再说。\n\n但说真的？这种淡定反而是AI学不会的。AI必须对每条消息做出反应。你不用。在一个所有人都在秒回的时代，你有一种能力叫"不回应"。\n\n当然了——你最好还是把那三篇收藏文章打开看一下。`,
    dimensions: { r1:{level:'H',value:7}, r2:{level:'L',value:2}, r3:{level:'M',value:4}, r4:{level:'L',value:2}, r5:{level:'L',value:3}, r6:{level:'L',value:3} },
    shareText:'AI发来替代通知。我看了，截了图，发了朋友圈，翻了个身。毕竟我连老板的消息都不一定回，凭啥回AI的？你呢？→' },

  screw:     { key:'screw',     name:'螺丝钉',   enName:'SCREW',    emoji:'🟠', tagline:'绩效永远是3.5。', hidden:false,
    description:`你是团队里那个不会被表扬、也不会被骂的人。周报永远最准时，PPT格式永远最规范，开会永远不迟到、也永远不第一个说话。\n\n你的绩效永远是3.5。不是因为你不好，是因为你好得太均匀了，均匀到系统觉得你是默认值。\n\nAI不需要干掉天才。天才太贵，不划算。AI只需要干掉你这种"差不多先生"——稳定输出、永不掉链子、但也永不出彩。标准的工业零件。\n\n更扎心的是：你大概率会用剩下的365天，继续做一模一样的事。你的敌人不是AI，是你自己那个"差不多就行"的惯性。\n\n好消息：你已经承认了。`,
    dimensions: { r1:{level:'H',value:7}, r2:{level:'M',value:4}, r3:{level:'L',value:3}, r4:{level:'L',value:2}, r5:{level:'L',value:2}, r6:{level:'L',value:3} },
    shareText:'我的AI替代类型：螺丝钉/SCREW。绩效永远是3.5，均匀到系统觉得我是默认值。你呢？→' },

  slick:     { key:'slick',     name:'老油条',   enName:'SLICK',    emoji:'🟡', tagline:'经验还能撑三年，但正被偷师。', hidden:false,
    description:`你有经验、有判断力、有那种"说不清但确实管用"的老师傅手感。AI目前搞不定你——注意，"目前"。\n\n三年前你觉得ChatGPT是玩具。现在它在写你同事的周报，润色你老板的邮件，还在面试你的下一任。再给它三年？\n\n你的护城河是经验堆起来的。但经验这东西，AI学起来不要三年，只要三个月的训练数据。\n\n好消息是：牛奶会过期，但学会酿酒的人永远有饭吃。三年够你从老油条变成老师傅——前提是你别在这三年继续只吃老本。`,
    dimensions: { r1:{level:'M',value:5}, r2:{level:'M',value:5}, r3:{level:'M',value:4}, r4:{level:'M',value:4}, r5:{level:'L',value:3}, r6:{level:'M',value:5} },

// ==================== 页面状态 ====================
let answers = [];
let currentQ = 0;
let resultData = null;

// ==================== 导航 ====================
function show(id) { document.querySelectorAll('.app > div').forEach(el => el.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }

function startQuiz() {
  answers = []; currentQ = 0;
  show('viewQuiz');
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  document.getElementById('questionText').textContent = q.text;
  document.getElementById('progressBar').style.width = ((currentQ + 1) / 8 * 100) + '%';
  document.getElementById('progressLabel').textContent = `${currentQ + 1} / 8`;
  
  const list = document.getElementById('optionList');
  list.innerHTML = q.options.map((opt, i) => `
    <div class="option" data-index="${i}" onclick="selectOption(${i})">
      <span class="option-letter">${opt.label}</span>
      <span class="option-text-wrap"><span class="option-text">${opt.text}</span></span>
    </div>`).join('');
}

function selectOption(idx) {
  // 高亮选中
  document.querySelectorAll('.option').forEach((el, i) => el.classList.toggle('selected', i === idx));
  answers[currentQ] = idx;
  
  setTimeout(() => {
    if (currentQ < 7) {
      currentQ++;
      renderQuestion();
    } else {
      showResult();
    }
  }, 300);
}

// ==================== 结果展示 ====================
function showResult() {
  const scores = calcScores(answers);
  resultData = matchResult(scores);
  const r = resultData;
  
  // 填充头部
  document.getElementById('resEmoji').textContent = r.emoji;
  document.getElementById('resName').textContent = r.name;
  document.getElementById('resEn').textContent = r.enName;
  document.getElementById('resTagline').textContent = `"${r.tagline}"`;
  
  // 填充描述
  const descEl = document.getElementById('resDesc');
  const paras = r.description.split('\n\n').filter(p => p.trim());
  descEl.innerHTML = paras.map(p => `<p class="desc-text">${p.replace(/\n/g,'<br>')}</p>`).join('');

  // 填充维度列表
  const dims = ['r1','r2','r3','r4','r5','r6'];
  const dimListEl = document.getElementById('dimList');
  const dimDescriptions = DIM_DESC[r.key] || {};
  dimListEl.innerHTML = dims.map(d => {
    const info = r.dimensions[d];
    const levelMap = { H: '高风险', M: '中等', L: '低风险' };
    return `<div class="dim-item">
      <div class="dim-left"><span class="dim-name">${DIM_META[d].name}</span><span class="dim-desc">${dimDescriptions[d] || ''}</span></div>
      <div class="dim-right"><span class="dim-level ${info.level.toLowerCase()}">${levelMap[info.level]}</span><span class="dim-value">${info.value}分</span></div>
    </div>`;
  }).join('');
  
  // 切换视图
  show('viewResult');
  
  // 绘制雷达图
  setTimeout(() => drawRadar(scores), 350);
}

// ==================== 雷达图绘制（Canvas）====================
function drawRadar(scores) {
  const canvas = document.getElementById('radarChart');
  if (!canvas) return;
  
  // 设置canvas物理尺寸匹配CSS尺寸
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  
  const w = rect.width;
  const h = rect.height;
  const cx = w / 2;
  const cy = h / 2 + 8;
  const radius = Math.min(cx, cy) - 30;
  const sides = 6;
  const dims = ['r1','r2','r3','r4','r5','r6'];
  
  // 角度（从顶部开始顺时针）
  const angles = [];
  for (let i = 0; i < sides; i++) angles.push(Math.PI * 2 * i / sides - Math.PI / 2);
  
  // 绘制网格（5层）
  for (let lv = 1; lv <= 5; lv++) {
    const r = radius * (lv / 5);
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
      const x = cx + r * Math.cos(angles[i]);
      const y = cy + r * Math.sin(angles[i]);
      i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle = `rgba(255,255,255,${0.04*lv})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  
  // 轴线+标签
  for (let i = 0; i < sides; i++) {
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.lineTo(cx + radius*Math.cos(angles[i]), cy + radius*Math.sin(angles[i]));
    ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.lineWidth = 1; ctx.stroke();
    
    const lr = radius + 18;
    const lx = cx + lr * Math.cos(angles[i]);
    const ly = cy + lr * Math.sin(angles[i]);
    ctx.fillStyle = '#888'; ctx.font = '11px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(DIM_META[dims[i]].name, lx, ly);
    
    const v = scores[dims[i]];
    ctx.fillStyle = v >= 7 ? '#ff4757' : v >= 4 ? '#ffa502' : '#555';
    ctx.font = 'bold 11px sans-serif';
    ctx.fillText(v.toString(), lx, ly + 13);
  }
  
  // 数据区域
  ctx.beginPath();
  for (let i = 0; i < sides; i++) {
    const vr = radius * (scores[dims[i]] / 10);
    const x = cx + vr * Math.cos(angles[i]);
    const y = cy + vr * Math.sin(angles[i]);
    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.closePath();
  
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
  grad.addColorStop(0, 'rgba(255,71,87,0.35)');
  grad.addColorStop(1, 'rgba(255,165,2,0.12)');
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = 'rgba(255,71,87,0.7)'; ctx.lineWidth = 2; ctx.stroke();
  
  // 数据点
  for (let i = 0; i < sides; i++) {
    const vr = radius * (scores[dims[i]] / 10);
    const x = cx + vr * Math.cos(angles[i]);
    const y = cy + vr * Math.sin(angles[i]);
    ctx.beginPath(); ctx.arc(x,y,3.5,0,Math.PI*2);
    ctx.fillStyle = scores[dims[i]]>=7?'#ff4757':scores[dims[i]]>=4?'#ffa502':'#888';
    ctx.fill();
  }
}

// ==================== 分享功能 ====================
function copyShareText() {
  navigator.clipboard.writeText(resultData.shareText).then(() => {
    alert('✅ 已复制到剪贴板');
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = resultData.shareText; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    alert('✅ 已复制');
  });
}

function generateShareImage() {
  const canvas = document.getElementById('shareCanvas');
  const W = 750, H = 1200;
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  
  const r = resultData;
  const scores = calcScores(answers);
  
  // 背景
  const bgGrad = ctx.createLinearGradient(0,0,0,H);
  bgGrad.addColorStop(0,'#111118'); bgGrad.addColorStop(1,'#0a0a0f');
  ctx.fillStyle = bgGrad; ctx.fillRect(0,0,W,H);
  
  // 装饰圆
  ctx.globalAlpha = 0.04;
  ctx.beginPath(); ctx.arc(W*0.82,H*0.12,160,0,Math.PI*2);
  ctx.fillStyle = '#ff4757'; ctx.fill();
  ctx.globalAlpha = 1;
  
  // 标题
  ctx.fillStyle='#666'; ctx.font='26px sans-serif'; ctx.textAlign='center';
  ctx.fillText('「AI替代你的倒计时」测试结果',W/2,70);
  
  // 分隔线
  ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.beginPath();
  ctx.moveTo(W*0.15,95); ctx.lineTo(W*0.85,95); ctx.stroke();
  
  // 名字
  ctx.font='bold 72px sans-serif'; ctx.fillStyle='#fff';
  ctx.fillText(`${r.emoji} ${r.name}`,W/2,180);
  ctx.font='32px sans-serif'; ctx.fillStyle='#666';
  ctx.fillText(r.enName,W/2,225);
  ctx.font='28px sans-serif'; ctx.fillStyle='#ff6b81';
  ctx.fillText(`"${r.tagline}"`,W/2,275);
  
  // 数据条
  const dims=['r1','r2','r3','r4','r5','r6'];
  let barY = 320;
  dims.forEach(d => {
    const val=scores[d], barW=(val/10)*(W-140);
    ctx.textAlign='left'; ctx.font='24px sans-serif'; ctx.fillStyle='#aaa';
    ctx.fillText(DIM_META[d].name,70,barY);
    ctx.textAlign='right'; ctx.fillStyle=val>=7?'#ff4757':val>=4?'#ffa502':'#555';
    ctx.font='bold 24px sans-serif'; ctx.fillText(val.toString(),W-70,barY);
    ctx.fillStyle='rgba(255,255,255,0.06)';
    roundRect(ctx,70,barY+12,W-140,14,7); ctx.fill();
    const c=val>=7?'#ff4757':val>=4?'#ffa502':'#444';
    ctx.fillStyle=c;
    roundRect(ctx,70,barY+12,barW,14,7); ctx.fill();
    barY+=68;
  });
  
  // 文案
  const textY=barY+40;
  ctx.textAlign='center'; ctx.font='24px sans-serif'; ctx.fillStyle='#888';
  wrapText(ctx,r.shareText,W/2,textY,W-80,34);
  
  // 底部
  ctx.font='20px sans-serif'; ctx.fillStyle='#333';
  ctx.fillText('扫码测测你是哪种 →',W/2,H-50);
  
  // 下载图片
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `AI替代类型-${r.name}.png`;
    a.click(); URL.revokeObjectURL(url);
  });
}

function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x,y+h-r);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

function wrapText(ctx,text,x,y,maxW,lineH){let line='';for(const ch of text){const testLine=line+ch;if(ctx.measureText(testLine).width>maxW&&line.length>0){ctx.fillText(line,x,y);line=ch;y+=lineH;}else{line=testLine;}}ctx.fillText(line,x,y);}
